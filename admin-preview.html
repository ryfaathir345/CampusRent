<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CampusRent Admin Preview</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#0b1c30",
                        "surface-bright": "#f8f9ff",
                        "secondary-fixed": "#6ffbbe",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-low": "#eff4ff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary-container": "#00714d",
                        "on-tertiary-container": "#ffd2be",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e2dfff",
                        "tertiary": "#7e3000",
                        "secondary-container": "#6cf8bb",
                        "on-secondary-fixed": "#002113",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#a44100",
                        "surface-dim": "#cbdbf5",
                        "surface-container-highest": "#d3e4fe",
                        "surface-variant": "#d3e4fe",
                        "on-secondary-fixed-variant": "#005236",
                        "on-surface-variant": "#464555",
                        "outline": "#777587",
                        "on-primary-container": "#dad7ff",
                        "surface": "#f8f9ff",
                        "background": "#f8f9ff",
                        "secondary": "#006c49",
                        "on-background": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c7c4d8",
                        "surface-container-high": "#dce9ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-tint": "#4d44e3",
                        "surface-container": "#e5eeff",
                        "primary": "#3525cd",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "primary-container": "#4f46e5",
                        "on-tertiary-fixed": "#351000",
                        "inverse-surface": "#213145",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "input_padding_y": "8px",
                        "sidebar_width": "260px",
                        "container_gap": "24px",
                        "input_padding_x": "12px",
                        "header_height": "64px"
                    },
                    "fontFamily": {
                        "display-lg": ["Geist", "sans-serif"],
                        "body-md": ["Geist", "sans-serif"],
                        "headline-sm": ["Geist", "sans-serif"],
                        "label-caps": ["Geist", "sans-serif"],
                        "mono-sm": ["Geist Mono", "monospace"],
                        "title-md": ["Geist", "sans-serif"]
                    }
                }
            }
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script crossorigin="" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">
<div id="root"></div>
<script type="text/babel">
        const { useState, useEffect } = React;

        const SideNavBar = ({ activePage, setActivePage }) => {
            const tabs = [
                { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
                { id: 'users', label: 'Users', icon: 'group' },
                { id: 'items', label: 'Items', icon: 'inventory_2' },
                { id: 'reports', label: 'Reports', icon: 'assessment' },
            ];

            return (
                <aside className="fixed left-0 top-0 h-full w-[260px] bg-white border-r border-slate-200 flex flex-col py-6 z-50">
                    <div className="px-6 mb-8 flex items-center gap-3">
                        <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">C</div>
                        <h1 className="text-xl font-bold text-slate-900 tracking-tight">CampusRent</h1>
                    </div>
                    <div className="px-4 mb-4">
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-2">Menu Utama</p>
                    </div>
                    <nav className="flex-1 overflow-y-auto px-4">
                        <ul className="space-y-1">
                            {tabs.map(tab => (
                                <li key={tab.id}>
                                    <button
                                        onClick={() => setActivePage(tab.id)}
                                        className={`w-full text-left transition-all duration-200 rounded-lg ${
                                            activePage === tab.id
                                                ? "flex items-center gap-3 px-3 py-2 bg-indigo-50 text-indigo-600 font-semibold"
                                                : "flex items-center gap-3 px-3 py-2 text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium"
                                        }`}
                                    >
                                        <span className="material-symbols-outlined text-[20px]">{tab.icon}</span>
                                        <span className="text-sm">{tab.label}</span>
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </nav>
                    <div className="px-4 mt-auto">
                        <button className="w-full flex items-center gap-3 px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg font-medium transition-colors text-sm">
                            <span className="material-symbols-outlined text-[20px]">logout</span>
                            Logout
                        </button>
                    </div>
                </aside>
            );
        };

        const TopNavBar = () => {
            return (
                <header className="sticky top-0 right-0 h-16 w-full z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 flex justify-between items-center px-8 ml-[260px]">
                    <div className="flex-1">
                        <div className="flex items-center gap-2 text-sm text-slate-500 font-medium">
                            <span>Admin</span>
                            <span className="material-symbols-outlined text-[16px]">chevron_right</span>
                            <span className="text-slate-900">Dashboard</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <div className="relative w-64 hidden md:block">
                            <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
                            <input type="text" placeholder="Search anything (Cmd+K)" className="w-full pl-9 pr-4 py-1.5 rounded-md border border-slate-200 bg-slate-50 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-sm outline-none placeholder:text-slate-400" />
                        </div>
                        <button className="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-all">
                            <span className="material-symbols-outlined text-[20px]">notifications</span>
                        </button>
                        <div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden border border-slate-300">
                             <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" alt="Admin" className="w-full h-full object-cover" />
                        </div>
                    </div>
                </header>
            );
        };

        const DashboardOverview = () => (
            <div className="max-w-6xl mx-auto space-y-6 animate-in fade-in duration-500 pb-12">
                <div className="flex justify-between items-center">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-900 tracking-tight">Dashboard Overview</h2>
                        <p className="text-sm text-slate-500 mt-1">Pantau aktivitas platform CampusRent secara real-time.</p>
                    </div>
                    <button className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-all shadow-sm flex items-center gap-2 active:scale-95">
                        <span className="material-symbols-outlined text-[18px]">download</span>
                        Export Data
                    </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    {[
                        { title: 'Total Pengguna', value: '1,284', trend: '+12%', up: true, icon: 'group' },
                        { title: 'Barang Aktif', value: '842', trend: '+5%', up: true, icon: 'inventory_2' },
                        { title: 'Total Transaksi', value: 'Rp 12.4Jt', trend: '+18%', up: true, icon: 'payments' },
                        { title: 'Laporan Pending', value: '14', trend: '-2%', up: false, icon: 'warning' }
                    ].map((stat, i) => (
                        <div key={i} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3 relative overflow-hidden group hover:border-indigo-200 hover:shadow-md transition-all">
                            <div className="flex justify-between items-start">
                                <span className="text-sm font-medium text-slate-500">{stat.title}</span>
                                <div className={`p-2 rounded-lg ${stat.up ? 'bg-indigo-50 text-indigo-600' : 'bg-red-50 text-red-600'}`}>
                                    <span className="material-symbols-outlined text-[18px]">{stat.icon}</span>
                                </div>
                            </div>
                            <div className="flex items-baseline gap-3">
                                <span className="text-3xl font-bold tracking-tight text-slate-900">{stat.value}</span>
                            </div>
                            <div className="flex items-center gap-1.5 mt-1">
                                <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${stat.up ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                                    {stat.trend}
                                </span>
                                <span className="text-xs text-slate-400">vs bulan lalu</span>
                            </div>
                        </div>
                    ))}
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
                     <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col min-h-[400px]">
                        <h3 className="text-base font-semibold text-slate-900 mb-6">Grafik Transaksi</h3>
                        <div className="flex-1 border-2 border-dashed border-slate-100 rounded-lg flex items-center justify-center text-slate-400 bg-slate-50/50">
                             [Area Chart Visualisasi Data]
                        </div>
                     </div>
                     <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col min-h-[400px]">
                        <h3 className="text-base font-semibold text-slate-900 mb-6">Aktivitas Terbaru</h3>
                        <div className="flex-1 overflow-y-auto space-y-5">
                            {[
                                { text: 'Budi menyewa Kamera DSLR', time: '5 mnt lalu', type: 'rent' },
                                { text: 'Laporan barang rusak oleh Siti', time: '1 jam lalu', type: 'report' },
                                { text: 'User baru terdaftar: Anton', time: '2 jam lalu', type: 'user' },
                                { text: 'Laptop Asus dikembalikan', time: '4 jam lalu', type: 'rent' },
                                { text: 'User Budi diblokir oleh admin', time: '1 hari lalu', type: 'admin' },
                            ].map((act, i) => (
                                <div key={i} className="flex gap-4 text-sm group cursor-pointer">
                                    <div className={`w-2 h-2 mt-1.5 rounded-full flex-shrink-0 ${act.type === 'report' ? 'bg-red-500' : act.type === 'admin' ? 'bg-slate-800' : 'bg-indigo-500'}`}></div>
                                    <div>
                                        <p className="font-medium text-slate-700 group-hover:text-indigo-600 transition-colors">{act.text}</p>
                                        <p className="text-slate-400 text-xs mt-0.5">{act.time}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                     </div>
                </div>
            </div>
        );

        const PlaceholderPage = ({ title }) => (
            <div className="max-w-6xl mx-auto animate-in fade-in duration-300">
                <h2 className="text-2xl font-bold text-slate-900 tracking-tight mb-6">{title}</h2>
                <div className="p-12 text-center text-slate-500 bg-white border-2 border-slate-200 border-dashed rounded-xl">
                    <span className="material-symbols-outlined text-4xl text-slate-300 mb-4 block">construction</span>
                    Halaman {title} akan diimplementasikan di sini dengan gaya desain yang sama.
                </div>
            </div>
        );

        const AdminLayout = () => {
            const [activePage, setActivePage] = useState('dashboard');

            return (
                <div className="min-h-screen bg-slate-50 flex font-sans">
                    <SideNavBar activePage={activePage} setActivePage={setActivePage} />
                    <div className="flex-1 ml-[260px] flex flex-col h-screen overflow-hidden">
                        <TopNavBar />
                        <main className="flex-1 overflow-y-auto p-8">
                            {activePage === 'dashboard' && <DashboardOverview />}
                            {activePage === 'users' && <PlaceholderPage title="Manajemen Pengguna" />}
                            {activePage === 'items' && <PlaceholderPage title="Moderasi Barang" />}
                            {activePage === 'reports' && <PlaceholderPage title="Laporan Sistem" />}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminLayout />);
    </script>
</body></html>
